name: AHK Release
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with AHK v2
        uses: benmusson/ahk2exe-action@v1
        with:
          in: DolphinScoreboardSync.ahk
          out: DolphinScoreboardSync.exe
          ahk-tag: v2.0.11

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DolphinScoreboardSync-EXE
          path: DolphinScoreboardSync.exe

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: DolphinScoreboardSync.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
