name: AHK Release
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup AHK
        uses: mmshightech/setup-autohotkey@v1
        with:
          version: '2.0.11'

      - name: Compile
        shell: pwsh
        run: |
          $ahkPath = "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe"
          Ahk2Exe.exe /in "DolphinScoreboardSync.ahk" /out "DolphinScoreboardSync.exe" /base $ahkPath

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DolphinScoreboardSync-EXE
          path: DolphinScoreboardSync.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: DolphinScoreboardSync.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
