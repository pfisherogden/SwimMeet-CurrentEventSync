name: Build and Release AutoHotkey Executable

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up AutoHotkey
        uses: mmshightech/setup-autohotkey@v1
        with:
          version: '2.0.11'

      - name: Compile AHK Script
        shell: pwsh
        run: |
          $ahkPath = "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe"
          if (Test-Path $ahkPath) {
            Ahk2Exe.exe /in "DolphinScoreboardSync.ahk" /out "DolphinScoreboardSync.exe" /base $ahkPath
          } else {
            Write-Error "AutoHotkey v2 binary not found at $ahkPath"
            exit 1
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: DolphinScoreboardSync.exe
          draft: false
          prerelease: false
          generate_release_notes: true
