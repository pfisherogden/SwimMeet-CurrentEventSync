name: Build and Release AutoHotkey Executable

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up AutoHotkey
      uses: mmshightech/setup-autohotkey@v1
      with:
        version: '2.0.11'

    - name: Compile AHK Script
      run: |
        & "C:\Program Files\AutoHotkey\Compiler\Ahk2Exe.exe" /in "DolphinScoreboardSync.ahk" /out "DolphinScoreboardSync.exe"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: DolphinScoreboardSync.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
