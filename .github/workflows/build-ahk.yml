name: Build AHK
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup AHK
        uses: mmshightech/setup-autohotkey@v1
        with:
          version: '2.0.11'

      - name: Compile
        shell: pwsh
        run: |
          $ahkPath = "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe"
          if (Test-Path $ahkPath) {
            Ahk2Exe.exe /in "DolphinScoreboardSync.ahk" /out "DolphinScoreboardSync.exe" /base $ahkPath
          } else {
            Write-Error "Binary not found"
            exit 1
          }

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DolphinScoreboardSync-EXE
          path: DolphinScoreboardSync.exe
