name: Build AutoHotkey Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up AutoHotkey
      uses: mmshightech/setup-autohotkey@v1
      with:
        version: '2.0.11'

    - name: Compile AHK Script
      run: |
        & "C:\Program Files\AutoHotkey\Compiler\Ahk2Exe.exe" /in "DolphinScoreboardSync.ahk" /out "DolphinScoreboardSync.exe"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DolphinScoreboardSync-EXE
        path: DolphinScoreboardSync.exe
